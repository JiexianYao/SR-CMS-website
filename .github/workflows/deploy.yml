name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject SCF URL
        env:
          SCF_URL: ${{ secrets.SCF_BASE_URL }}
        run: |
          sed -i "s|__SCF_BASE_URL__|${SCF_URL}|g" index.html
          echo "=== 注入验证 ==="
          grep "SCF_BASE_URL" index.html | head -1

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
