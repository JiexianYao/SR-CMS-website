name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject SCF URL
        env:
          SCF_URL: ${{ secrets.SCF_BASE_URL }}
        run: |
          sed -i "s|__SCF_BASE_URL__|${SCF_URL}|g" index.html
          echo "=== 注入验证（如下不含 __ 说明替换成功）==="
          grep "SCF_BASE_URL" index.html | head -1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
